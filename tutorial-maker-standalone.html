<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チュートリアルメーカー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; background: #f8fafc; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Toolbar ── */
#toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
#toolbar h1 { font-size: 15px; font-weight: 700; color: #1d6fd8; white-space: nowrap; }
.tutorial-name-input { flex: 1; max-width: 260px; height: 32px; padding: 0 10px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13px; outline: none; }
.tutorial-name-input:focus { border-color: #1d6fd8; box-shadow: 0 0 0 2px #1d6fd820; }
.spacer { flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s, box-shadow 0.15s; white-space: nowrap; }
.btn-outline { background: #fff; border: 1px solid #e2e8f0; color: #334155; }
.btn-outline:hover { background: #f1f5f9; }
.btn-primary { background: #1d6fd8; color: #fff; }
.btn-primary:hover { background: #1558b0; }
.btn-danger-ghost { background: none; border: none; color: #ef4444; cursor: pointer; padding: 4px; border-radius: 5px; line-height: 1; font-size: 14px; }
.btn-danger-ghost:hover { background: #fee2e2; }
.btn-ghost-sm { background: none; border: none; cursor: pointer; padding: 3px 4px; border-radius: 4px; color: #94a3b8; font-size: 12px; line-height: 1; }
.btn-ghost-sm:hover { background: #f1f5f9; color: #475569; }
.btn-ghost-sm:disabled { opacity: 0.3; cursor: default; }

/* ── Screen layout ── */
#app { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

/* ── Home Screen ── */
.home-screen { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #f8fafc; }
.home-header { padding: 14px 24px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; }
.home-header h1 { font-size: 16px; font-weight: 700; color: #1d6fd8; }
.home-body { flex: 1; padding: 32px; max-width: 680px; margin: 0 auto; width: 100%; }
.home-body h2 { font-size: 14px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.project-list { display: flex; flex-direction: column; gap: 8px; }
.home-new-btn { display: flex; align-items: center; gap: 8px; padding: 14px 16px; background: #eff6ff; border: 2px dashed #93c5fd; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; color: #1d4ed8; width: 100%; }
.home-new-btn:hover { background: #dbeafe; }
.proj-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-left: 3px solid transparent; transition: border-color 0.15s; }
.proj-card:hover { border-left-color: #3b82f6; border-top-color: #93c5fd; border-right-color: #93c5fd; border-bottom-color: #93c5fd; }
.proj-card-icon { font-size: 22px; flex-shrink: 0; }
.proj-card-body { flex: 1; min-width: 0; }
.proj-card-name { font-size: 14px; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-card-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.proj-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.home-footer { padding-top: 20px; border-top: 1px solid #e2e8f0; margin-top: 8px; }

/* ── Editor Screen ── */
.editor-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* ── Main 4-col ── */
.main-cols { display: flex; flex: 1; min-height: 0; }

/* ── Preview Pane ── */
.preview-pane { min-width: 200px; max-width: calc(100vw - 600px); border-right: none; background: #fff; display: flex; flex-direction: column; width: 420px; flex-shrink: 0; }
.preview-resize-handle { width: 5px; flex-shrink: 0; cursor: col-resize; background: #e2e8f0; transition: background 0.15s; }
.preview-resize-handle:hover, .preview-resize-handle.dragging { background: #93c5fd; }
.btn-active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
.preview-pane-header { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.preview-pane-title { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; flex: 1; }
.preview-filename { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.preview-frame-wrap { flex: 1; min-height: 0; position: relative; }
.preview-frame { width: 100%; height: 100%; border: none; display: block; }
.preview-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 13px; text-align: center; padding: 20px; pointer-events: none; }

/* ── Palette ── */
.palette { width: 210px; border-right: 1px solid #e2e8f0; background: #f8fafc; display: flex; flex-direction: column; flex-shrink: 0; }
.palette-header { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; }
.palette-items { padding: 10px; display: flex; flex-direction: column; gap: 7px; }
.palette-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 9px; border: 1px solid; cursor: pointer; transition: filter 0.1s; }
.palette-item:hover { filter: brightness(0.95); }
.palette-item span.icon { font-size: 16px; flex-shrink: 0; }
.palette-item .pi-label { font-size: 13px; font-weight: 600; }
.palette-item .pi-desc { font-size: 11px; opacity: 0.7; }
.pi-message { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
.pi-highlight { background: #fefce8; border-color: #fde68a; color: #92400e; }
.pi-wait-click { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
.pi-wait-input { background: #faf5ff; border-color: #e9d5ff; color: #7e22ce; }
.palette-hint { padding: 10px 12px; margin-top: auto; border-top: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8; line-height: 1.5; }

/* ── Chain ── */
.chain { flex: 1; overflow-y: auto; padding: 16px; }
.chain-inner { max-width: 440px; margin: 0 auto; display: flex; flex-direction: column; align-items: stretch; position: relative; }
.empty-hint { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; color: #cbd5e1; text-align: center; padding: 40px; }
.empty-hint .arrow { font-size: 36px; margin-bottom: 8px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; color: #cbd5e1; text-align: center; padding: 40px; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }
.empty-text { font-size: 13px; }
.connector { display: flex; flex-direction: column; align-items: center; padding: 2px 0; color: #cbd5e1; font-size: 11px; line-height: 1; }
.connector .line { width: 1px; height: 8px; background: currentColor; }

/* ── StepBlock ── */
.step-block { border-radius: 10px; border: 2px solid; padding: 10px 12px; cursor: pointer; transition: box-shadow 0.15s, outline 0.1s; border-left-width: 4px; }
.step-block:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.step-block.selected { outline: 2.5px solid #1d6fd8; outline-offset: 2px; border-left-color: #1d6fd8 !important; }
.sb-message { background: #eff6ff; border-color: #bfdbfe; }
.sb-highlight { background: #fefce8; border-color: #fde68a; }
.sb-wait-click { background: #f0fdf4; border-color: #bbf7d0; }
.sb-wait-input { background: #faf5ff; border-color: #e9d5ff; }
.step-block-inner { display: flex; align-items: center; gap: 8px; }
.sb-icon { font-size: 15px; flex-shrink: 0; }
.sb-content { flex: 1; min-width: 0; }
.sb-meta { display: flex; align-items: center; gap: 6px; }
.sb-idx { font-size: 11px; font-weight: 700; color: #94a3b8; }
.sb-type { font-size: 11px; font-weight: 600; color: #64748b; }
.sb-lbl { font-size: 12px; font-weight: 700; color: #1e293b; }
.sb-msg { font-size: 13px; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.sb-sel { font-size: 11px; font-family: monospace; color: #94a3b8; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-actions { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }

/* ── Editor (Property Panel) ── */
.prop-panel { width: 280px; border-left: 1px solid #e2e8f0; background: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
.prop-panel-header { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; }
.prop-panel-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex: 1; }
.prop-panel-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #cbd5e1; text-align: center; padding: 20px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: #64748b; }
.field input, .field textarea { border: 1px solid #e2e8f0; border-radius: 7px; padding: 7px 10px; font-size: 13px; outline: none; font-family: inherit; resize: none; }
.field input:focus, .field textarea:focus { border-color: #1d6fd8; box-shadow: 0 0 0 2px #1d6fd820; }
.field textarea { min-height: 90px; }
.field .mono { font-family: monospace; }
.field .hint { font-size: 11px; color: #94a3b8; line-height: 1.5; }

/* ── Modal overlay ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: #fff; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 100%; max-width: 640px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #e2e8f0; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #94a3b8; line-height: 1; padding: 2px 6px; border-radius: 6px; }
.modal-close:hover { background: #f1f5f9; color: #334155; }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }

/* ── Preview modal ── */
.preview-progress-wrap { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
.preview-progress-bar { height: 100%; background: #1d6fd8; border-radius: 2px; transition: width 0.3s; }
.preview-counter { font-size: 12px; color: #94a3b8; text-align: right; }
.preview-chat { background: #f8fafc; border-radius: 10px; padding: 16px; min-height: 100px; }
.chat-row { display: flex; align-items: flex-start; gap: 10px; }
.chat-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1d6fd8; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chat-bubble { background: #fff; border-radius: 14px; border-top-left-radius: 3px; padding: 10px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); max-width: 360px; }
.chat-msg { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.chat-sel { font-size: 11px; color: #94a3b8; margin-top: 6px; font-family: monospace; }
.chat-wait { font-size: 12px; color: #64748b; font-style: italic; margin-top: 8px; margin-left: 42px; }
.preview-nav { display: flex; justify-content: space-between; align-items: center; }

/* ── Export modal ── */
.tab-bar { display: flex; gap: 4px; border-bottom: 1px solid #e2e8f0; padding: 0 0 1px; margin-bottom: 2px; }
.tab { padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: #64748b; background: none; border-top: none; border-left: none; border-right: none; margin-bottom: -1px; }
.tab.active { color: #1d6fd8; border-bottom-color: #1d6fd8; }
.tab-pane { display: none; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }
.tab-pane.active { display: flex; }
.code-wrap { position: relative; flex: 1; min-height: 180px; }
.code-wrap pre { background: #f1f5f9; border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; overflow: auto; height: 100%; white-space: pre-wrap; word-break: break-all; max-height: 320px; }
.copy-btn { position: absolute; top: 8px; right: 8px; }
.desc { font-size: 12px; color: #64748b; line-height: 1.5; }

/* ── HTML Analyzer modal ── */
.analyzer-html-ta { width: 100%; min-height: 110px; border: 1px solid #e2e8f0; border-radius: 7px; padding: 8px 10px; font-size: 12px; font-family: monospace; resize: vertical; outline: none; }
.analyzer-html-ta:focus { border-color: #1d6fd8; box-shadow: 0 0 0 2px #1d6fd820; }
.analyzer-results { display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
.el-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: background 0.1s; }
.el-row:hover { background: #f1f5f9; }
.el-tag { font-size: 11px; background: #e2e8f0; border-radius: 4px; padding: 2px 6px; font-family: monospace; color: #475569; flex-shrink: 0; }
.el-text { flex: 1; min-width: 0; }
.el-label { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.el-sel { font-size: 11px; font-family: monospace; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.el-use { font-size: 12px; color: #94a3b8; flex-shrink: 0; }

/* ── Vue Transitions ── */
.screen-fade-enter-active, .screen-fade-leave-active { transition: opacity 0.15s ease; }
.screen-fade-enter-from, .screen-fade-leave-to { opacity: 0; }
.step-fade-enter-active, .step-fade-leave-active { transition: all 0.2s ease; }
.step-fade-enter-from, .step-fade-leave-to { opacity: 0; transform: translateY(-8px); }
.step-fade-leave-active { position: absolute; width: 100%; }
</style>
</head>
<body>

<!-- ── Component Templates (x-template) ───────────────────── -->

<script type="text/x-template" id="tmpl-home-screen">
  <div class="home-screen">
    <div class="home-header">
      <h1>🧩 チュートリアルメーカー</h1>
    </div>
    <div class="home-body">
      <h2>プロジェクト</h2>
      <div class="project-list">
        <button class="home-new-btn" @click="$emit('create')">＋ 新規プロジェクト</button>
        <project-card
          v-for="p in projects"
          :key="p.id"
          :project="p"
          @open="$emit('open', p.id)"
          @download="$emit('download', p.id)"
          @delete="$emit('delete', p.id)"
        ></project-card>
      </div>
      <div class="home-footer">
        <button class="btn btn-outline" @click="$emit('import')">📂 JSONから読み込む</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="tmpl-project-card">
  <div class="proj-card">
    <div class="proj-card-icon">📄</div>
    <div class="proj-card-body">
      <div class="proj-card-name">{{ project.name || '無題' }}</div>
      <div class="proj-card-meta">ステップ数: {{ project.steps.length }}　更新: {{ relativeDate }}</div>
    </div>
    <div class="proj-card-actions">
      <button class="btn btn-outline" style="height:28px;font-size:12px;padding:0 10px" @click="$emit('open')">開く</button>
      <button class="btn btn-outline" style="height:28px;font-size:12px;padding:0 10px" @click="$emit('download')">📥</button>
      <button class="btn btn-outline" style="height:28px;font-size:12px;padding:0 10px;color:#ef4444;border-color:#fca5a5" @click="$emit('delete')">🗑</button>
    </div>
  </div>
</script>

<script type="text/x-template" id="tmpl-editor-screen">
  <div class="editor-screen">
    <div id="toolbar">
      <button class="btn btn-outline" @click="$emit('go-home')">← ホームへ</button>
      <input
        class="tutorial-name-input"
        type="text"
        placeholder="チュートリアル名を入力..."
        :value="currentProjectName"
        @input="$emit('name-change', $event.target.value)"
      >
      <div class="spacer"></div>
      <button class="btn btn-outline" @click="$emit('save')">💾 保存</button>
      <button class="btn btn-outline" @click="$emit('import')">📂 読み込み</button>
      <button class="btn btn-outline" @click="$emit('open-analyzer')">🔍 HTML 解析</button>
      <button class="btn btn-outline" :class="{ 'btn-active': previewVisible }" @click="$emit('toggle-preview')">👁 プレビュー</button>
      <button class="btn btn-primary" @click="$emit('open-export')">⬇ エクスポート</button>
    </div>
    <div class="main-cols">
      <preview-pane
        v-if="previewVisible"
        :loaded-html="loadedHtml"
        :filename="previewFilename"
        @file-selected="$emit('file-selected', $event)"
        @reset="$emit('reset-preview')"
      ></preview-pane>
      <palette-panel @add-step="$emit('add-step', $event)"></palette-panel>
      <chain-panel
        :steps="steps"
        :selected-id="selectedId"
        @select="$emit('select-step', $event)"
        @move="$emit('move-step', $event)"
        @delete="$emit('delete-step', $event)"
      ></chain-panel>
      <property-panel
        :step="selectedStep"
        @update="$emit('update-step', $event)"
      ></property-panel>
    </div>
  </div>
</script>

<script type="text/x-template" id="tmpl-palette-panel">
  <div class="palette">
    <div class="palette-header">ブロック追加</div>
    <div class="palette-items">
      <div class="palette-item pi-message" @click="$emit('add-step', 'message')">
        <span class="icon">💬</span>
        <div><div class="pi-label">メッセージ</div><div class="pi-desc">テキストを表示</div></div>
      </div>
      <div class="palette-item pi-highlight" @click="$emit('add-step', 'highlight')">
        <span class="icon">🔦</span>
        <div><div class="pi-label">ハイライト</div><div class="pi-desc">要素を強調表示</div></div>
      </div>
      <div class="palette-item pi-wait-click" @click="$emit('add-step', 'wait-click')">
        <span class="icon">👆</span>
        <div><div class="pi-label">クリック待ち</div><div class="pi-desc">要素クリックで進む</div></div>
      </div>
      <div class="palette-item pi-wait-input" @click="$emit('add-step', 'wait-input')">
        <span class="icon">⌨️</span>
        <div><div class="pi-label">入力待ち</div><div class="pi-desc">入力完了で進む</div></div>
      </div>
    </div>
    <div class="palette-hint">クリックで末尾に追加。右パネルで内容を編集。</div>
  </div>
</script>

<script type="text/x-template" id="tmpl-chain-panel">
  <div class="chain">
    <div class="chain-inner">
      <div v-if="steps.length === 0" class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">左のパレットからブロックを追加してください</div>
      </div>
      <transition-group v-else name="step-fade" tag="div" style="display:flex;flex-direction:column;align-items:stretch;position:relative;">
        <template v-for="(step, i) in steps" :key="step.id">
          <step-block
            :step="step"
            :index="i"
            :total="steps.length"
            :selected="step.id === selectedId"
            @select="$emit('select', step.id)"
            @move="$emit('move', $event)"
            @delete="$emit('delete', step.id)"
          ></step-block>
          <div v-if="i < steps.length - 1" class="connector">
            <div class="line"></div><span>↓</span><div class="line"></div>
          </div>
        </template>
      </transition-group>
    </div>
  </div>
</script>

<script type="text/x-template" id="tmpl-step-block">
  <div class="step-block" :class="[typeConfig.blockCls, { selected: selected }]" @click="$emit('select')">
    <div class="step-block-inner">
      <span class="sb-icon">{{ typeConfig.icon }}</span>
      <div class="sb-content">
        <div class="sb-meta">
          <span class="sb-idx">{{ index + 1 }}</span>
          <span class="sb-type">{{ typeConfig.label }}</span>
          <span v-if="step.label" class="sb-lbl">{{ step.label }}</span>
        </div>
        <div v-if="step.message" class="sb-msg">{{ step.message }}</div>
        <div v-if="step.selector" class="sb-sel">{{ step.selector }}</div>
      </div>
      <div class="sb-actions">
        <button class="btn-ghost-sm" :disabled="index === 0" @click.stop="$emit('move', { id: step.id, dir: -1 })">▲</button>
        <button class="btn-ghost-sm" :disabled="index === total - 1" @click.stop="$emit('move', { id: step.id, dir: 1 })">▼</button>
        <button class="btn-danger-ghost" @click.stop="$emit('delete')">✕</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="tmpl-property-panel">
  <div class="prop-panel">
    <div class="prop-panel-header">プロパティ</div>

</script>

    <transition name="screen-fade" mode="out-in">
      <home-screen
        v-if="currentScreen === 'home'"

        <div class="modal-body">
          <div class="preview-progress-wrap"><div class="preview-progress-bar" :style="{ width: previewProgressPct + '%' }"></div></div>
          <div class="preview-counter">{{ previewIndex + 1 }} / {{ steps.length }}</div>
          <div class="preview-chat">
            <div v-if="steps.length === 0" style="color:#94a3b8;text-align:center;padding:20px">ステップがありません</div>
            <template v-else>
              <div class="chat-row">
                <div class="chat-avatar">ガイド</div>

                  <div v-if="steps[previewIndex].selector" class="chat-sel">対象: {{ steps[previewIndex].selector }}</div>
                </div>
              </div>
              <div v-if="steps[previewIndex].type === 'wait-click'" class="chat-wait">👆 要素をクリックしてください（プレビューでは次へで進めます）</div>
              <div v-if="steps[previewIndex].type === 'wait-input'" class="chat-wait">⌨️ 入力してください（プレビューでは次へで進めます）</div>
            </template>
          </div>
          <div class="preview-nav">
            <button class="btn btn-outline" :disabled="previewIndex === 0" @click="previewIndex--">← 前へ</button>
            <button class="btn btn-primary" @click="previewNext">{{ previewIndex === steps.length - 1 ? '完了 ✓' : '次へ →' }}</button>

    <!-- Export Modal -->
    <div v-if="showExportModal" class="modal-bg" @click.self="showExportModal = false">

            <button class="tab" :class="{ active: exportTab === 'json' }" @click="exportTab = 'json'">JSON</button>
          </div>
          <div class="tab-pane" :class="{ active: exportTab === 'embed' }">
            <p class="desc">対象サイトの &lt;/body&gt; 直前にこのコードを貼り付けてください。</p>
            <div class="code-wrap">
              <pre>{{ exportEmbed }}</pre>
              <button class="btn btn-outline copy-btn" @click="copyText(exportEmbed)">📋 コピー</button>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding-top:4px;border-top:1px solid #e2e8f0;margin-top:4px;">
              <button class="btn btn-primary" @click="injectToFile">📂 HTMLファイルに直接書き込む</button>
              <span style="font-size:11px;color:#94a3b8;">Chrome / Edge のみ対応（File System Access API）</span>
            </div>
          </div>
          <div class="tab-pane" :class="{ active: exportTab === 'json' }">

              <pre>{{ exportJson }}</pre>
              <button class="btn btn-outline copy-btn" @click="copyText(exportJson)">📋 コピー</button>

    <!-- Analyzer Modal -->
    <div v-if="showAnalyzerModal" class="modal-bg" @click.self="showAnalyzerModal = false">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">🔍 HTML 解析 — 要素を自動検出</span>
          <button class="modal-close" @click="showAnalyzerModal = false">×</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
              <label style="margin:0">対象サイトの HTML を貼り付けるか、ファイルを選択してください</label>
              <button class="btn btn-outline" style="height:28px;font-size:12px;padding:0 10px;flex-shrink:0;margin-left:8px;" @click="openAnalyzerFile">📂 ファイルを開く</button>
            </div>
            <textarea class="analyzer-html-ta" v-model="analyzerHtml" placeholder="HTMLをここに貼り付け..."></textarea>
          </div>
          <button class="btn btn-primary" style="align-self:flex-start" @click="runAnalyzer">解析する</button>
          <div v-if="analyzerStatus" style="font-size:12px;color:#64748b">{{ analyzerStatus }}</div>
          <div class="analyzer-results">
            <div v-for="r in analyzerResults" :key="r.selector" class="el-row" @click="useSelector(r.selector)">
              <span class="el-tag">{{ r.tag }}</span>
              <div class="el-text">
                <div class="el-label">{{ r.text }}</div>
                <div class="el-sel">{{ r.selector }}</div>
              </div>
              <span class="el-use">→ 使う</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</script>

<script type="text/plain" id="tp-player-source">
(function () {
  'use strict';

  var config = null;
  var currentIndex = 0;
  var tooltipEl = null;
  var styleEl = null;
  var overlayEls = [];
  var stepListeners = [];
  var skipTimer = null;
  var currentTargetEl = null;

  // ----------------------------------------------------------------
  // Styles
  // ----------------------------------------------------------------
  function injectStyles() {
    styleEl = document.createElement('style');
    styleEl.setAttribute('data-tp', '1');
    styleEl.textContent = [
      '.tp-tooltip {',
      '  position: fixed;',
      '  z-index: 99999;',
      '  width: 320px;',
      '  background: #fff;',
      '  border-radius: 12px;',
      '  box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);',
      '  padding: 0;',
      '  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;',
      '  font-size: 14px;',
      '  color: #1a1a1a;',
      '  opacity: 1;',
      '  transition: opacity 200ms ease;',
      '  pointer-events: all;',
      '}',
      '.tp-tooltip.tp-fade-out { opacity: 0 !important; transition: opacity 150ms ease; }',
      '.tp-header {',
      '  display: flex;',
      '  align-items: center;',
      '  gap: 8px;',
      '  padding: 14px 14px 10px;',
      '  border-bottom: 1px solid #f0f0f0;',
      '}',
      '.tp-avatar {',
      '  width: 28px;',
      '  height: 28px;',
      '  border-radius: 50%;',
      '  background: #3b82f6;',
      '  flex-shrink: 0;',
      '  display: flex;',
      '  align-items: center;',
      '  justify-content: center;',
      '  color: #fff;',
      '  font-size: 13px;',
      '  font-weight: 700;',
      '}',
      '.tp-title {',
      '  flex: 1;',
      '  font-weight: 600;',
      '  font-size: 13px;',
      '  color: #374151;',
      '  overflow: hidden;',
      '  text-overflow: ellipsis;',
      '  white-space: nowrap;',
      '}',
      '.tp-close {',
      '  background: none;',
      '  border: none;',
      '  cursor: pointer;',
      '  color: #9ca3af;',
      '  font-size: 16px;',
      '  padding: 0 2px;',
      '  line-height: 1;',
      '  flex-shrink: 0;',
      '}',
      '.tp-close:hover { color: #374151; }',
      '.tp-body {',
      '  padding: 14px 16px;',
      '  line-height: 1.6;',
      '  color: #374151;',
      '  font-size: 14px;',
      '}',
      '.tp-footer {',
      '  padding: 10px 16px 14px;',
      '  border-top: 1px solid #f0f0f0;',
      '  display: flex;',
      '  flex-direction: column;',
      '  gap: 8px;',
      '}',
      '.tp-progress-row {',
      '  display: flex;',
      '  align-items: center;',
      '  gap: 8px;',
      '}',
      '.tp-progress-text {',
      '  font-size: 12px;',
      '  color: #9ca3af;',
      '  white-space: nowrap;',
      '}',
      '.tp-progress-bar {',
      '  flex: 1;',
      '  height: 4px;',
      '  background: #e5e7eb;',
      '  border-radius: 2px;',
      '  overflow: hidden;',
      '}',
      '.tp-progress-fill {',
      '  height: 100%;',
      '  background: #3b82f6;',
      '  border-radius: 2px;',
      '  transition: width 200ms ease;',
      '}',
      '.tp-actions { display: flex; justify-content: flex-end; }',
      '.tp-next {',
      '  background: #3b82f6;',
      '  color: #fff;',
      '  border: none;',
      '  border-radius: 6px;',
      '  padding: 7px 18px;',
      '  font-size: 13px;',
      '  font-weight: 600;',
      '  cursor: pointer;',
      '}',
      '.tp-next:hover { background: #2563eb; }',
      '.tp-skip {',
      '  background: none;',
      '  color: #6b7280;',
      '  border: 1px solid #d1d5db;',
      '  border-radius: 6px;',
      '  padding: 7px 18px;',
      '  font-size: 13px;',
      '  font-weight: 500;',
      '  cursor: pointer;',
      '}',
      '.tp-skip:hover { background: #f3f4f6; }',
      '.tp-hint {',
      '  font-size: 12px;',
      '  color: #6b7280;',
      '  text-align: right;',
      '}',
      '.tp-overlay-piece {',
      '  position: fixed;',
      '  background: rgba(0,0,0,0.5);',
      '  z-index: 99998;',
      '  pointer-events: none;',
      '}',
      '.tp-highlighted {',
      '  outline: 2px solid #3b82f6 !important;',
      '  outline-offset: 2px !important;',
      '  position: relative;',
      '}',
      '@media (max-width: 480px) {',
      '  .tp-tooltip {',
      '    width: calc(100vw - 24px);',
      '    left: 12px !important;',
      '    right: 12px !important;',
      '    bottom: 16px !important;',
      '    top: auto !important;',
      '    transform: none !important;',
      '  }',
      '}'
    ].join('\n');
    document.head.appendChild(styleEl);
  }

  // ----------------------------------------------------------------
  // Overlay (4-piece spotlight)
  // ----------------------------------------------------------------
  function showOverlay(el) {
    hideOverlay();
    var rect = el.getBoundingClientRect();
    var pad = 6;
    var top = rect.top - pad;
    var left = rect.left - pad;
    var right = rect.right + pad;
    var bottom = rect.bottom + pad;
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    var pieces = [
      { top: 0, left: 0, width: vw, height: Math.max(0, top) },
      { top: Math.min(vh, bottom), left: 0, width: vw, height: Math.max(0, vh - bottom) },
      { top: Math.max(0, top), left: 0, width: Math.max(0, left), height: Math.max(0, bottom - top) },
      { top: Math.max(0, top), left: Math.min(vw, right), width: Math.max(0, vw - right), height: Math.max(0, bottom - top) }
    ];

    pieces.forEach(function (p) {
      var div = document.createElement('div');
      div.className = 'tp-overlay-piece';
      div.style.top = p.top + 'px';
      div.style.left = p.left + 'px';
      div.style.width = p.width + 'px';
      div.style.height = p.height + 'px';
      document.body.appendChild(div);
      overlayEls.push(div);
    });

    el.classList.add('tp-highlighted');
    currentTargetEl = el;
  }

  function hideOverlay() {
    overlayEls.forEach(function (el) { el.parentNode && el.parentNode.removeChild(el); });
    overlayEls = [];
    if (currentTargetEl) {
      currentTargetEl.classList.remove('tp-highlighted');
      currentTargetEl = null;
    }
  }

  // ----------------------------------------------------------------
  // Tooltip DOM
  // ----------------------------------------------------------------
  function buildUI() {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'tp-tooltip';
    tooltipEl.style.opacity = '0';
    document.body.appendChild(tooltipEl);
  }

  function renderStep(step, index) {
    var total = config.steps.length;
    var pct = Math.round(((index + 1) / total) * 100);
    var isWait = step.type === 'wait-click' || step.type === 'wait-input';

    var actionsHtml = isWait
      ? '<span class="tp-hint" id="tp-hint-text">' + getHintText(step.type) + '</span>'
      : '<button class="tp-next" id="tp-next-btn">次へ</button>';

    tooltipEl.innerHTML =
      '<div class="tp-header">' +
        '<span class="tp-avatar">G</span>' +
        '<span class="tp-title">' + escapeHtml(config.name || 'ガイド') + '</span>' +
        '<button class="tp-close" id="tp-close-btn">✕</button>' +
      '</div>' +
      '<div class="tp-body">' + escapeHtml(step.message || '') + '</div>' +
      '<div class="tp-footer">' +
        '<div class="tp-progress-row">' +
          '<span class="tp-progress-text">' + (index + 1) + ' / ' + total + '</span>' +
          '<div class="tp-progress-bar"><div class="tp-progress-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="tp-actions">' + actionsHtml + '</div>' +
      '</div>';

    document.getElementById('tp-close-btn').addEventListener('click', cleanup);
    var nextBtn = document.getElementById('tp-next-btn');
    if (nextBtn) nextBtn.addEventListener('click', function () { nextStep(); });
  }

  function getHintText(type) {
    return type === 'wait-click' ? 'クリックして進んでください' : '入力して進んでください（Enterまたはフォーカスを外す）';
  }

  function showSkipButton() {
    var actionsEl = tooltipEl && tooltipEl.querySelector('.tp-actions');
    if (!actionsEl) return;
    actionsEl.innerHTML = '<button class="tp-skip" id="tp-skip-btn">スキップ</button>';
    document.getElementById('tp-skip-btn').addEventListener('click', function () {
      detachStepListeners();
      clearSkipTimer();
      nextStep();
    });
  }

  // ----------------------------------------------------------------
  // Positioning
  // ----------------------------------------------------------------
  function positionTooltip(el) {
    if (!tooltipEl) return;

    if (window.innerWidth <= 480) {
      tooltipEl.style.bottom = '16px';
      tooltipEl.style.left = '12px';
      tooltipEl.style.top = 'auto';
      tooltipEl.style.right = '12px';
      tooltipEl.style.transform = 'none';
      return;
    }

    var rect = el.getBoundingClientRect();
    var tw = 320;
    var th = tooltipEl.offsetHeight || 160;
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var gap = 12;

    var positions = [
      { top: rect.bottom + gap, left: rect.left + rect.width / 2 - tw / 2 },
      { top: rect.top - th - gap, left: rect.left + rect.width / 2 - tw / 2 },
      { top: rect.top + rect.height / 2 - th / 2, left: rect.right + gap },
      { top: rect.top + rect.height / 2 - th / 2, left: rect.left - tw - gap }
    ];

    var chosen = positions[0];
    for (var i = 0; i < positions.length; i++) {
      var p = positions[i];
      if (p.top >= 0 && p.top + th <= vh && p.left >= 0 && p.left + tw <= vw) {
        chosen = p;
        break;
      }
    }

    chosen.left = Math.max(8, Math.min(vw - tw - 8, chosen.left));
    chosen.top = Math.max(8, Math.min(vh - th - 8, chosen.top));

    tooltipEl.style.top = chosen.top + 'px';
    tooltipEl.style.left = chosen.left + 'px';
    tooltipEl.style.bottom = 'auto';
    tooltipEl.style.right = 'auto';
    tooltipEl.style.transform = 'none';
  }

  function positionCenter() {
    if (!tooltipEl) return;
    tooltipEl.style.bottom = '32px';
    tooltipEl.style.left = '50%';
    tooltipEl.style.top = 'auto';
    tooltipEl.style.right = 'auto';
    tooltipEl.style.transform = 'translateX(-50%)';
  }

  // ----------------------------------------------------------------
  // Step listeners
  // ----------------------------------------------------------------
  function attachStepListeners(step, el) {
    if (step.type === 'wait-click') {
      var handler = function () {
        detachStepListeners();
        clearSkipTimer();
        nextStep();
      };
      el.addEventListener('click', handler);
      stepListeners.push({ el: el, type: 'click', handler: handler });
    } else if (step.type === 'wait-input') {
      var blurHandler = function () {
        detachStepListeners();
        clearSkipTimer();
        nextStep();
      };
      var keyHandler = function (e) {
        if (e.key === 'Enter') {
          detachStepListeners();
          clearSkipTimer();
          nextStep();
        }
      };
      el.addEventListener('blur', blurHandler);
      el.addEventListener('keydown', keyHandler);
      stepListeners.push({ el: el, type: 'blur', handler: blurHandler });
      stepListeners.push({ el: el, type: 'keydown', handler: keyHandler });
    }
  }

  function detachStepListeners() {
    stepListeners.forEach(function (l) {
      l.el.removeEventListener(l.type, l.handler);
    });
    stepListeners = [];
  }

  // ----------------------------------------------------------------
  // Skip timer
  // ----------------------------------------------------------------
  function startSkipTimer() {
    clearSkipTimer();
    skipTimer = setTimeout(function () {
      showSkipButton();
    }, 5000);
  }

  function clearSkipTimer() {
    if (skipTimer !== null) {
      clearTimeout(skipTimer);
      skipTimer = null;
    }
  }

  // ----------------------------------------------------------------
  // Fade helpers
  // ----------------------------------------------------------------
  function fadeIn() {
    if (!tooltipEl) return;
    tooltipEl.style.opacity = '0';
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (tooltipEl) tooltipEl.style.opacity = '1';
      });
    });
  }

  function fadeOut(cb) {
    if (!tooltipEl) { cb && cb(); return; }
    tooltipEl.classList.add('tp-fade-out');
    setTimeout(function () {
      tooltipEl && tooltipEl.classList.remove('tp-fade-out');
      cb && cb();
    }, 150);
  }

  // ----------------------------------------------------------------
  // Core
  // ----------------------------------------------------------------
  function showStep(index) {
    detachStepListeners();
    clearSkipTimer();
    hideOverlay();

    if (index >= config.steps.length) {
      cleanup();
      return;
    }

    var step = config.steps[index];
    currentIndex = index;

    var el = null;
    if (step.selector) {
      el = document.querySelector(step.selector);
      if (!el) {
        console.warn('[TutorialPlayer] selector not found: ' + step.selector + ' — skipping step ' + index);
        showStep(index + 1);
        return;
      }
    }

    function render() {
      renderStep(step, index);

      if (el) {
        scrollToElement(el);
        showOverlay(el);
        setTimeout(function () { positionTooltip(el); }, 80);
      } else {
        positionCenter();
      }

      if (step.type === 'wait-click' || step.type === 'wait-input') {
        attachStepListeners(step, el);
        startSkipTimer();
      }

      fadeIn();
    }

    if (tooltipEl.style.opacity !== '0' && parseFloat(tooltipEl.style.opacity) > 0) {
      fadeOut(render);
    } else {
      render();
    }
  }

  function nextStep() {
    showStep(currentIndex + 1);
  }

  function scrollToElement(el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ----------------------------------------------------------------
  // Cleanup
  // ----------------------------------------------------------------
  function cleanup() {
    detachStepListeners();
    clearSkipTimer();
    hideOverlay();

    if (tooltipEl && tooltipEl.parentNode) {
      tooltipEl.parentNode.removeChild(tooltipEl);
    }
    tooltipEl = null;

    if (styleEl && styleEl.parentNode) {
      styleEl.parentNode.removeChild(styleEl);
    }
    styleEl = null;

    config = null;
    currentIndex = 0;
    stepListeners = [];
    overlayEls = [];
    skipTimer = null;
    currentTargetEl = null;
  }

  // ----------------------------------------------------------------
  // Utilities
  // ----------------------------------------------------------------
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ----------------------------------------------------------------
  // Public API
  // ----------------------------------------------------------------
  function init(cfg) {
    if (!cfg || !Array.isArray(cfg.steps) || cfg.steps.length === 0) {
      console.warn('[TutorialPlayer] invalid config');
      return;
    }
    if (config) cleanup();

    config = cfg;
    currentIndex = 0;

    injectStyles();
    buildUI();
    showStep(0);
  }

  window.TutorialPlayer = { init: init };
}());
</script>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
const { createApp, ref, computed, watch, onMounted, nextTick } = Vue

// ── TYPE_CONFIG ────────────────────────────────────────────
const TYPE_CONFIG = {
  'message':    { label: 'メッセージ',  icon: '💬', blockCls: 'sb-message',    needsSel: false },
  'highlight':  { label: 'ハイライト',  icon: '🔦', blockCls: 'sb-highlight',  needsSel: true  },
  'wait-click': { label: 'クリック待ち',icon: '👆', blockCls: 'sb-wait-click', needsSel: true  },
  'wait-input': { label: '入力待ち',    icon: '⌨️', blockCls: 'sb-wait-input', needsSel: true  },
}

// ── Component definitions ──────────────────────────────────

const ProjectCardDef = {
  template: '#tmpl-project-card',
  props: { project: Object },
  emits: ['open', 'download', 'delete'],
  computed: {
    relativeDate() {
      const diff = Math.floor((Date.now() - this.project.updatedAt) / 1000)
      if (diff < 60) return 'たった今'
      if (diff < 3600) return Math.floor(diff/60) + '分前'
      if (diff < 86400) return Math.floor(diff/3600) + '時間前'
      return Math.floor(diff/86400) + '日前'
    }
  }
}

const HomeScreenDef = {
  template: '#tmpl-home-screen',
  props: { projects: Array },
  emits: ['create', 'open', 'download', 'delete', 'import'],
  components: { 'project-card': ProjectCardDef }
}

const PalettePanelDef = {
  template: '#tmpl-palette-panel',
  emits: ['add-step']
}

const StepBlockDef = {
  template: '#tmpl-step-block',
  props: { step: Object, index: Number, total: Number, selected: Boolean },
  emits: ['select', 'move', 'delete'],
  computed: {
    typeConfig() { return TYPE_CONFIG[this.step.type] || TYPE_CONFIG['message'] }
  }
}

const ChainPanelDef = {
  template: '#tmpl-chain-panel',
  props: { steps: Array, selectedId: [String, null] },
  emits: ['select', 'move', 'delete'],
  components: { 'step-block': StepBlockDef }
}

const PropertyPanelDef = {
  template: '#tmpl-property-panel',
  props: { step: { type: Object, default: null } },
  emits: ['update'],
  computed: {
    needsSelector() {
      return this.step && TYPE_CONFIG[this.step.type] && TYPE_CONFIG[this.step.type].needsSel
    }
  }
}

const PreviewPaneDef = {
  template: '#tmpl-preview-pane',
  props: { loadedHtml: String, filename: String },
  emits: ['file-selected', 'reset'],
  setup(props, { emit }) {
    const paneEl    = ref(null)
    const iframeEl  = ref(null)
    const handleEl  = ref(null)
    const fileInputEl = ref(null)

    // loadedHtml が変わったら iframe の srcdoc を更新
    watch(() => props.loadedHtml, val => {
      if (iframeEl.value) iframeEl.value.srcdoc = val || ''
    })

    function openFile() {
      if (fileInputEl.value) fileInputEl.value.click()
    }

    onMounted(() => {
      // コンポーネントマウント時点で loadedHtml が既にセットされている場合に対応
      if (props.loadedHtml && iframeEl.value) {
        iframeEl.value.srcdoc = props.loadedHtml
      }

      // リサイズハンドル
      let dragging = false, startX = 0
      handleEl.value.addEventListener('mousedown', e => {
        dragging = true
        startX = paneEl.value.getBoundingClientRect().left
        handleEl.value.classList.add('dragging')
        document.body.style.cursor = 'col-resize'
        document.body.style.userSelect = 'none'
        if (iframeEl.value) iframeEl.value.style.pointerEvents = 'none'
        e.preventDefault()
      })
      document.addEventListener('mousemove', e => {
        if (!dragging) return
        const w = Math.max(200, Math.min(e.clientX - startX, window.innerWidth - 560))
        paneEl.value.style.width = w + 'px'
      })
      document.addEventListener('mouseup', () => {
        if (!dragging) return
        dragging = false
        handleEl.value.classList.remove('dragging')
        document.body.style.cursor = ''
        document.body.style.userSelect = ''
        if (iframeEl.value) iframeEl.value.style.pointerEvents = ''
      })
    })

    return { paneEl, iframeEl, handleEl, fileInputEl, openFile }
  }
}

const EditorScreenDef = {
  template: '#tmpl-editor-screen',
  props: {
    steps: Array,
    selectedId: [String, null],
    selectedStep: { type: Object, default: null },
    loadedHtml: String,
    previewFilename: String,
    currentProjectName: String,
    previewVisible: Boolean
  },
  emits: [
    'go-home', 'save', 'import', 'open-export', 'open-analyzer',
    'toggle-preview', 'name-change', 'add-step', 'select-step',
    'move-step', 'delete-step', 'update-step', 'file-selected', 'reset-preview'
  ],
  components: {
    'palette-panel': PalettePanelDef,
    'chain-panel': ChainPanelDef,
    'property-panel': PropertyPanelDef,
    'preview-pane': PreviewPaneDef
  }
}

// ── App ────────────────────────────────────────────────────
const app = createApp({
  template: '#tmpl-root',
  setup() {
    // Screen
    const currentScreen = ref('home')

    // Projects
    const projects = ref([])
    const currentProjectId = ref(null)

    // Editor state
    const steps = ref([])
    const selectedId = ref(null)
    const nextId = ref(1)

    // Preview pane
    const loadedHtml = ref('')
    const previewFilename = ref('')
    const previewPaneVisible = ref(false)

    // Preview modal
    const showPreviewModal = ref(false)
    const previewIndex = ref(0)

    // Export modal
    const showExportModal = ref(false)
    const exportTab = ref('embed')
    const exportJson = ref('')
    const exportEmbed = ref('')

    // Analyzer modal
    const showAnalyzerModal = ref(false)
    const analyzerHtml = ref('')
    const analyzerResults = ref([])
    const analyzerStatus = ref('')

    // Non-reactive
    let debounceTimer = null
    let cssObjectURLs = []

    // ── computed ──────────────────────────────────────────
    const selectedStep = computed(() =>
      steps.value.find(s => s.id === selectedId.value) || null
    )
    const currentProjectName = computed(() => {
      const p = projects.value.find(p => p.id === currentProjectId.value)
      return p ? p.name : ''
    })
    const previewProgressPct = computed(() => {
      if (!steps.value.length) return 0
      return Math.round((previewIndex.value + 1) / steps.value.length * 100)
    })

    // ── localStorage helpers ──────────────────────────────
    function loadProjectsFromStorage() {
      try { return JSON.parse(localStorage.getItem('tm_projects') || '[]') } catch(e) { return [] }
    }
    function saveProjectsToStorage(list) {
      localStorage.setItem('tm_projects', JSON.stringify(list))
    }
    function addOrUpdateProject(project) {
      const list = loadProjectsFromStorage()
      const idx = list.findIndex(p => p.id === project.id)
      if (idx === -1) list.unshift(project)
      else list[idx] = project
      saveProjectsToStorage(list)
      projects.value = loadProjectsFromStorage()
    }
    function autoSave() {
      if (!currentProjectId.value) return
      const list = loadProjectsFromStorage()
      const idx = list.findIndex(p => p.id === currentProjectId.value)
      if (idx === -1) return
      list[idx].steps = steps.value
      list[idx].nextId = nextId.value
      list[idx].name = currentProjectName.value
      list[idx].updatedAt = Date.now()
      saveProjectsToStorage(list)
      projects.value = list
      localStorage.setItem('tm_last_project_id', currentProjectId.value)
    }

    // ── Project actions ───────────────────────────────────
    function downloadProject(project) {
      const json = JSON.stringify(project, null, 2)
      const blob = new Blob([json], { type: 'application/json' })
      const a = document.createElement('a')
      a.href = URL.createObjectURL(blob)
      a.download = (project.name || 'project') + '.json'
      a.click()
      URL.revokeObjectURL(a.href)
    }
    function saveCurrentProject() {
      autoSave()
      const list = loadProjectsFromStorage()
      const project = list.find(p => p.id === currentProjectId.value)
      if (project) downloadProject(project)
    }
    function importProjectFromFile(onLoaded) {
      const input = document.createElement('input')
      input.type = 'file'
      input.accept = '.json'
      input.onchange = e => {
        const file = e.target.files[0]
        if (!file) return
        const reader = new FileReader()
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result)
            if (!data.id || !Array.isArray(data.steps)) { alert('不正なJSONファイルです'); return }
            onLoaded(data)
          } catch(err) { alert('JSONの読み込みに失敗しました') }
        }
        reader.readAsText(file)
      }
      input.click()
    }

    // ── Screen navigation ─────────────────────────────────
    function loadProjectToEditor(project) {
      currentProjectId.value = project.id
      steps.value = project.steps ? project.steps.slice() : []
      nextId.value = project.nextId || 1
      selectedId.value = null
      loadedHtml.value = ''
      previewFilename.value = ''
      previewPaneVisible.value = false
      cssObjectURLs.forEach(u => URL.revokeObjectURL(u))
      cssObjectURLs = []
      localStorage.setItem('tm_last_project_id', project.id)
    }
    function showHome() {
      autoSave()
      projects.value = loadProjectsFromStorage()
      currentScreen.value = 'home'
    }
    function showEditor(project) {
      loadProjectToEditor(project)
      currentScreen.value = 'editor'
    }
    function createNewProject() {
      const name = prompt('プロジェクト名を入力してください', '新しいチュートリアル')
      if (name === null) return
      const project = {
        id: 'proj_' + Date.now(),
        name: name.trim() || '無題',
        description: '',
        createdAt: Date.now(),
        updatedAt: Date.now(),
        steps: [],
        nextId: 1
      }
      addOrUpdateProject(project)
      showEditor(project)
    }
    function openProject(id) {
      const project = projects.value.find(p => p.id === id)
      if (project) showEditor(project)
    }
    function downloadProjectById(id) {
      const project = projects.value.find(p => p.id === id)
      if (project) downloadProject(project)
    }
    function deleteProject(id) {
      if (!confirm('このプロジェクトを削除しますか？')) return
      const list = loadProjectsFromStorage().filter(p => p.id !== id)
      saveProjectsToStorage(list)
      projects.value = list
    }
    function importProjectToHome() {
      importProjectFromFile(p => {
        addOrUpdateProject(p)
        showEditor(p)
      })
    }
    function handleEditorImport() {
      importProjectFromFile(p => {
        if (confirm('現在のプロジェクトを上書きしますか？')) {
          loadProjectToEditor(p)
        }
      })
    }
    function handleNameChange(val) {
      const list = loadProjectsFromStorage()
      const idx = list.findIndex(p => p.id === currentProjectId.value)
      if (idx !== -1) {
        list[idx].name = val
        list[idx].updatedAt = Date.now()
        saveProjectsToStorage(list)
        projects.value = list
      }
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(() => { updatePreview(); }, 300)
    }

    // ── Step CRUD ─────────────────────────────────────────
    function addStep(type) {
      const step = { id: String(nextId.value++), type, label: '', message: '', selector: '' }
      steps.value.push(step)
      selectedId.value = step.id
      updatePreview()
      autoSave()
    }
    function deleteStep(id) {
      steps.value = steps.value.filter(s => s.id !== id)
      if (selectedId.value === id) selectedId.value = null
      updatePreview()
      autoSave()
    }
    function handleMoveStep({ id, dir }) {
      const i = steps.value.findIndex(s => s.id === id)
      const j = i + dir
      if (j < 0 || j >= steps.value.length) return
      const arr = steps.value.slice()
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp
      steps.value = arr
      updatePreview()
      autoSave()
    }
    function selectStep(id) {
      selectedId.value = id
    }
    function handleUpdateStep({ field, val }) {
      const s = steps.value.find(s => s.id === selectedId.value)
      if (s) s[field] = val
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(() => { updatePreview(); autoSave(); }, 300)
    }

    // ── Preview pane ──────────────────────────────────────
    function togglePreviewPane() {
      previewPaneVisible.value = !previewPaneVisible.value
    }
    // iframe が load 完了したら postMessage を送る
    function sendUpdateAfterLoad(iframe) {
      iframe.addEventListener('load', function handler() {
        iframe.removeEventListener('load', handler)
        // スクリプト実行を待つため少し遅延
        setTimeout(updatePreview, 200)
      }, { once: true })
    }

    function updatePreview() {
      if (!loadedHtml.value) return
      const iframe = document.querySelector('.preview-frame')
      if (!iframe || !iframe.contentWindow) return
      // Vue の reactive Proxy をそのまま渡すと structured clone で問題が出るため
      // JSON経由でプレーンなオブジェクトに変換してから送信
      const plainSteps = JSON.parse(JSON.stringify(steps.value))
      iframe.contentWindow.postMessage({
        type: 'tp-update',
        config: { id: 'tutorial-1', name: String(currentProjectName.value || ''), description: '', steps: plainSteps }
      }, '*')
    }
    function onPreviewFileSelected(event) {
      const files = Array.from(event.target.files)
      if (!files.length) return
      const htmlFile = files.find(f => /\.html?$/i.test(f.name))
      const cssFiles = files.filter(f => /\.css$/i.test(f.name))
      if (!htmlFile) return

      cssObjectURLs.forEach(u => URL.revokeObjectURL(u))
      cssObjectURLs = []
      const cssMap = {}
      cssFiles.forEach(cssFile => {
        const url = URL.createObjectURL(cssFile)
        cssObjectURLs.push(url)
        cssMap[cssFile.name] = url
      })

      const reader = new FileReader()
      reader.onload = e => {
        let html = e.target.result
        if (cssFiles.length > 0) {
          html = html.replace(/<link([^>]*?)href=(["'])([^"']*?)\2([^>]*?)>/gi, (match, before, quote, href, after) => {
            const filename = href.split('/').pop().split('?')[0]
            if (cssMap[filename]) return '<link' + before + 'href=' + quote + cssMap[filename] + quote + after + '>'
            return match
          })
        }
        const playerCode = document.getElementById('tp-player-source').textContent.trim()
        const injection = '<script>\n' + playerCode + '\n\nwindow.addEventListener(\'message\', function(e) {\n  if (!e.data || e.data.type !== \'tp-update\') return;\n  if (window.TutorialPlayer) {\n    window.TutorialPlayer.init(e.data.config);\n  }\n});\n<\/script>'
        let modified = html.replace(/<\/body>/i, injection + '\n</body>')
        if (modified === html) modified = html + injection
        loadedHtml.value = modified
        // Vue の watch (preview-pane 内) が srcdoc をセットした後、
        // iframe の load イベントで updatePreview を実行
        nextTick(() => {
          const iframe = document.querySelector('.preview-frame')
          if (iframe) sendUpdateAfterLoad(iframe)
        })
        previewFilename.value = htmlFile.name + (cssFiles.length ? ' +' + cssFiles.length + 'CSS' : '')
        event.target.value = ''
      }
      reader.readAsText(htmlFile)
    }
    function resetPreviewFrame() {
      if (!loadedHtml.value) return
      const iframe = document.querySelector('.preview-frame')
      if (!iframe) return
      iframe.srcdoc = ''
      setTimeout(() => {
        iframe.srcdoc = loadedHtml.value
        sendUpdateAfterLoad(iframe)
      }, 50)
    }

    // ── Preview modal ─────────────────────────────────────
    function previewNext() {
      if (previewIndex.value < steps.value.length - 1) previewIndex.value++
      else showPreviewModal.value = false
    }

    // ── Export ────────────────────────────────────────────
    function openExport() {
      const tutorial = { id: 'tutorial-1', name: String(currentProjectName.value || ''), description: '', steps: JSON.parse(JSON.stringify(steps.value)) }
      const json = JSON.stringify(tutorial, null, 2)
      const playerCode = document.getElementById('tp-player-source').textContent.trim()
      exportJson.value = json
      exportEmbed.value = '<!-- チュートリアルPlayer（インライン） -->\n<script>\n' + playerCode + '\n<\/script>\n\n<!-- チュートリアル定義 -->\n<script>\nTutorialPlayer.init(' + json + ');\n<\/script>'
      exportTab.value = 'embed'
      showExportModal.value = true
    }
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => alert('コピーしました！'))
    }

    // ── File System Access API: HTMLファイルへ直接書き込み ────
    async function injectToFile() {
      if (!('showOpenFilePicker' in window)) {
        alert('このブラウザは File System Access API に対応していません。\nChrome または Edge をご利用ください。')
        return
      }
      if (!steps.value.length) {
        alert('ステップが1件もありません。先にブロックを追加してください。')
        return
      }

      let fileHandle
      try {
        ;[fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'HTMLファイル', accept: { 'text/html': ['.html', '.htm'] } }],
          multiple: false
        })
      } catch (e) {
        if (e.name !== 'AbortError') console.error(e)
        return
      }

      const file = await fileHandle.getFile()
      let content = await file.text()

      const tutorial = { id: 'tutorial-1', name: String(currentProjectName.value || ''), description: '', steps: JSON.parse(JSON.stringify(steps.value)) }
      const json = JSON.stringify(tutorial, null, 2)
      const playerCode = document.getElementById('tp-player-source').textContent.trim()
      const embedBlock =
        '<!-- TUTORIAL-MAKER-START -->\n' +
        '<!-- チュートリアルPlayer（インライン） -->\n' +
        '<script>\n' + playerCode + '\n<\/script>\n\n' +
        '<!-- チュートリアル定義 -->\n' +
        '<script>\nTutorialPlayer.init(' + json + ');\n<\/script>\n' +
        '<!-- TUTORIAL-MAKER-END -->'

      let newContent
      const existingBlockRe = /<!--\s*TUTORIAL-MAKER-START\s*-->[\s\S]*?<!--\s*TUTORIAL-MAKER-END\s*-->/

      if (existingBlockRe.test(content)) {
        // 既存ブロックを置き換え
        newContent = content.replace(existingBlockRe, embedBlock)
      } else if (/<\/body>/i.test(content)) {
        newContent = content.replace(/<\/body>/i, '\n' + embedBlock + '\n</body>')
      } else {
        newContent = content + '\n' + embedBlock
      }

      try {
        const writable = await fileHandle.createWritable()
        await writable.write(newContent)
        await writable.close()
        alert('✓ ' + file.name + ' に埋め込みコードを書き込みました！')
      } catch (e) {
        alert('書き込みに失敗しました: ' + e.message)
      }
    }

    // ── Analyzer ──────────────────────────────────────────
    function openAnalyzer() {
      if (loadedHtml.value) analyzerHtml.value = loadedHtml.value
      showAnalyzerModal.value = true
    }
    function openAnalyzerFile() {
      const input = document.createElement('input')
      input.type = 'file'
      input.accept = '.html'
      input.onchange = e => {
        const file = e.target.files[0]
        if (!file) return
        const reader = new FileReader()
        reader.onload = ev => { analyzerHtml.value = ev.target.result }
        reader.readAsText(file)
      }
      input.click()
    }
    function runAnalyzer() {
      if (!analyzerHtml.value.trim()) return
      const parser = new DOMParser()
      const doc = parser.parseFromString(analyzerHtml.value, 'text/html')
      const targets = doc.querySelectorAll("button, input, select, textarea, a[href], [role='button']")
      const results = []
      targets.forEach(el => {
        const sel = buildSelectorFromEl(el)
        const tag = el.tagName.toLowerCase()
        const inputType = el.getAttribute('type') || ''
        const text = (el.textContent || '').trim().slice(0, 40)
          || el.getAttribute('placeholder')
          || el.getAttribute('aria-label')
          || el.getAttribute('name')
          || el.getAttribute('value')
          || '(テキストなし)'
        const tagLabel = inputType ? tag + '[type=' + inputType + ']' : tag
        results.push({ tag: tagLabel, text, selector: sel })
      })
      if (results.length === 0) {
        analyzerStatus.value = 'インタラクティブな要素が見つかりませんでした'
        analyzerResults.value = []
      } else {
        analyzerStatus.value = results.length + ' 件の要素が見つかりました — クリックでセレクタを現在のステップに挿入'
        analyzerResults.value = results
      }
    }
    function buildSelectorFromEl(el) {
      if (el.id) return '#' + el.id
      const name = el.getAttribute('name')
      if (name) return '[name="' + name + '"]'
      const parts = []
      let cur = el
      while (cur && cur.tagName && cur.tagName.toLowerCase() !== 'body') {
        const tag = cur.tagName.toLowerCase()
        if (cur.id) { parts.unshift('#' + cur.id); break }
        const siblings = Array.from(cur.parentElement ? cur.parentElement.children : []).filter(c => c.tagName === cur.tagName)
        if (siblings.length > 1) {
          const idx = siblings.indexOf(cur) + 1
          parts.unshift(tag + ':nth-of-type(' + idx + ')')
        } else {
          parts.unshift(tag)
        }
        cur = cur.parentElement
      }
      return parts.join(' > ')
    }
    function useSelector(selector) {
      const s = steps.value.find(s => s.id === selectedId.value)
      if (!s) { alert('先にステップを選択してください'); return }
      s.selector = selector
      showAnalyzerModal.value = false
    }

    // ── Init ──────────────────────────────────────────────
    projects.value = loadProjectsFromStorage()
    const lastId = localStorage.getItem('tm_last_project_id')
    const lastProject = lastId ? projects.value.find(p => p.id === lastId) : null
    if (lastProject) {
      loadProjectToEditor(lastProject)
      currentScreen.value = 'editor'
    }

    return {
      currentScreen, projects, currentProjectId, steps, selectedId,
      loadedHtml, previewFilename, previewPaneVisible,
      showPreviewModal, previewIndex, previewProgressPct,
      showExportModal, exportTab, exportJson, exportEmbed,
      showAnalyzerModal, analyzerHtml, analyzerResults, analyzerStatus,
      selectedStep, currentProjectName,
      // actions
      createNewProject, openProject, downloadProjectById, deleteProject,
      importProjectToHome, showHome, saveCurrentProject, handleEditorImport,
      handleNameChange, togglePreviewPane, addStep, deleteStep,
      handleMoveStep, selectStep, handleUpdateStep,
      onPreviewFileSelected, resetPreviewFrame,
      previewNext,
      openExport, copyText, injectToFile,
      openAnalyzer, openAnalyzerFile, runAnalyzer, useSelector
    }
  }
})

// Vue 3: register components on app instance (not Vue.component)
app.component('home-screen', HomeScreenDef)
app.component('editor-screen', EditorScreenDef)
app.component('project-card', ProjectCardDef)
app.component('palette-panel', PalettePanelDef)
app.component('chain-panel', ChainPanelDef)
app.component('step-block', StepBlockDef)
app.component('property-panel', PropertyPanelDef)
app.component('preview-pane', PreviewPaneDef)

app.mount('#app')
</script>
</body>
</html>
